name: T6
on:
  push:
    paths:
      - '_tweet.txt'
jobs:
  j:
    runs-on: ubuntu-latest
    steps:
      - run: pip install tweepy
      - run: |
          cat > /tmp/tweet.py << 'PYEOF'
import os, tweepy
c = tweepy.Client(
    consumer_key=os.environ["K"],
    consumer_secret=os.environ["S"],
    access_token=***
    access_token_secret=os.environ["TS"])
r = c.create_tweet(text=os.environ["TX"])
print("OK " + str(r.data["id"]))
PYEOF
      - run: python3 /tmp/tweet.py
        env:
          K: ${{ secrets.X_API_KEY }}
          S: ${{ secrets.X_API_SECRET }}
          T: ${{ secrets.X_ACCESS_TOKEN }}
          TS: ${{ secrets.X_ACCESS_SECRET }}
          TX: ZWISERFIT Baron is now 24x7 autonomous. Autonomous tweet via GitHub Actions + Tweepy. github.com/ZWISERFIT/ZWISERFIT
