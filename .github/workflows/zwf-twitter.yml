name: ZWF Twitter Bot
on:
  push:
    paths:
      - '_tweet.txt'
jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - run: pip install tweepy
      - run: |
          echo 'import os,tweepy' > /tmp/t.py
          echo 'c=tweepy.Client(consumer_key=os.environ["K"],consumer_secret=os.environ["S"],access_token=os.environ["T"],access_token_secret=os.environ["TS"])' >> /tmp/t.py
          echo 'r=c.create_tweet(text=os.environ["TX"])' >> /tmp/t.py
          echo 'print("OK "+str(r.data["id"]))' >> /tmp/t.py
          python3 /tmp/t.py
        env:
          K: ${{ secrets.X_API_KEY }}
          S: ${{ secrets.X_API_SECRET }}
          T: ${{ secrets.X_ACCESS_TOKEN }}
          TS: ${{ secrets.X_ACCESS_SECRET }}
          TX: ZWISERFIT Baron named params fix. Autonomous via GitHub Actions. github.com/ZWISERFIT/ZWISERFIT
