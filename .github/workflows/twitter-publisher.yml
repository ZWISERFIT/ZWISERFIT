name: Twitter Publisher Bridge
on:
  workflow_dispatch:
    inputs:
      tweet_text:
        description: "Single tweet text"
        required: false
        type: string
      thread_json:
        description: 'JSON array of tweets, e.g. ["t1","t2"]'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Publish to Twitter via CF Worker
        env:
          WORKER_URL: ${{ secrets.TWITTER_WORKER_URL }}
          AUTH_SECRET: ${{ secrets.TWITTER_AUTH_SECRET }}
          TWEET_TEXT: ${{ github.event.inputs.tweet_text }}
          THREAD_JSON: ${{ github.event.inputs.thread_json }}
        run: |
          if [ -n "$THREAD_JSON" ]; then
            echo "Publishing thread..."
            curl -s -X POST "${WORKER_URL}/thread" \
              -H "Authorization: Bearer ${AUTH_SECRET}" \
              -H "Content-Type: application/json" \
              -d "$(echo "$THREAD_JSON" | jq -c '{tweets: .}')"
          else
            echo "Publishing single tweet..."
            PAYLOAD=$(jq -n --arg text "$TWEET_TEXT" '{text: $text}')
            curl -s -X POST "${WORKER_URL}/tweet" \
              -H "Authorization: Bearer ${AUTH_SECRET}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
          fi
