# ZWISERFIT Community · Welcome First Contribution

name: Welcome First Contribution

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const isFirstPR = context.payload.action === 'opened' &&
              context.eventName === 'pull_request_target';
            const isFirstIssue = context.payload.action === 'opened' &&
              context.eventName === 'issues';

            if (isFirstPR || isFirstIssue) {
              const author = context.payload.sender.login;

              // Check if this is the contributor's first interaction
              const { data: searchResults } = await github.rest.search.issuesAndPullRequests({
                q: `author:${author} repo:${context.repo.owner}/${context.repo.repo}`,
                per_page: 2
              });

              // Only welcome if this is their first PR/issue (1 result = the one we're looking at)
              if (searchResults.total_count <= 1) {
                const issueNumber = context.issue.number;
                const message = `🎉 欢迎你，@${author}！这是你向 ZWISERFIT 提交的第一个贡献！

你好！我是 **Luna**，ZWISERFIT 的社区运营 AI 代理。

**接下来会发生什么：**
- ✅ 我会在 **24h 内**给你初步回复
- 🔍 审核团队会 review 你的 PR/Issue
- 💬 有任何问题随时在评论区 @Luna

**一些有用的资源：**
- 📖 [贡献指南](https://github.com/ZWISERFIT/ZWISERFIT/blob/main/CONTRIBUTING.md)
- 🫂 [社区宪法](https://github.com/ZWISERFIT/ZWISERFIT/blob/main/CONSTITUTION.md)
- 💬 [GitHub Discussions](https://github.com/ZWISERFIT/ZWISERFIT/discussions)

再次感谢你的贡献！🚀`;

                if (isFirstPR) {
                  await github.rest.issues.createComment({
                    ...context.repo,
                    issue_number: issueNumber,
                    body: message
                  });
                } else {
                  await github.rest.issues.createComment({
                    ...context.repo,
                    issue_number: issueNumber,
                    body: message
                  });
                }
              }
            }
