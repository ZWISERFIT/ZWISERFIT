name: ZWF Bot
on:
  repository_dispatch:
    types: [tweet,thread]
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install tweepy
      - run: |
          python3 -c "
import os,json,tweepy
c=tweepy.Client(os.environ['K'],os.environ['S'],os.environ['T'],os.environ['TS'])
p=os.environ.get('PAYLOAD','{}')
data=json.loads(p)
txt=data.get('text','')
if txt:
    r=c.create_tweet(text=txt)
    print(f'✅ https://x.com/i/status/{r.data[\"id\"]}')
else:
    print('No text provided')
"
        env:
          K: ${{ secrets.X_API_KEY }}
          S: *** secrets.X_API_SECRET }}
          T: ${{ secrets.X_ACCESS_TOKEN }}
          TS: ${{ secrets.X_ACCESS_SECRET }}
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
