name: ZWF Bot
on: [workflow_dispatch]
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install tweepy
      - run: |
          python3 -c "
import os,tweepy
c=tweepy.Client(os.environ['K'],os.environ['S'],os.environ['T'],os.environ['TS'])
try:
    txt=open('_tweet.txt').read().strip()
    if not txt: raise Exception('empty')
    r=c.create_tweet(text=txt)
    print(f'✅ https://x.com/i/status/{r.data[\"id\"]}')
    open('_tweet.txt','w').close()
except Exception as e:
    print(f'Skipped: {e}')
"
        env:
          K: ${{ secrets.X_API_KEY }}
          S: *** secrets.X_API_SECRET }}
          T: ${{ secrets.X_ACCESS_TOKEN }}
          TS: ${{ secrets.X_ACCESS_SECRET }}
      - run: |
          git config user.name "Baron"
          git config user.email "baron@zwiserfit.com"
          git add _tweet.txt
          git diff --cached --quiet || (git commit -m "clear tweet" && git push)
