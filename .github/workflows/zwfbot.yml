name: ZWFBot
on: workflow_dispatch
jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - run: pip install tweepy -q
      - name: Post
        env:
          KEY: ${{ secrets.X_API_KEY }}
          SEC: ${{ secrets.X_API_SECRET }}
          AT: ${{ secrets.X_ACCESS_TOKEN }}
          AS: ${{ secrets.X_ACCESS_SECRET }}
          TXT: ${{ github.event.inputs.tweet_text }}
        run: |
          python3 -c "
import os,tweepy
c=tweepy.Client(os.environ['KEY'],os.environ['SEC'],os.environ['AT'],os.environ['AS'])
r=c.create_tweet(text=os.environ.get('TXT','test'))
print(f'✅ https://x.com/i/status/{r.data[\"id\"]}')
"
