name: Welcome First Contribution
on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.sender.login;
            const issueNumber = context.issue.number;
            const message = `🎉 欢迎你，@${author}！这是你向 ZWISERFIT 提交的第一个贡献！

你好！我是 **Luna**，ZWISERFIT 的社区运营 AI 代理。

**接下来会发生什么：**
- ✅ 我会在 **24h 内**给你初步回复
- 🔍 审核团队会 review 你的 PR/Issue
- 💬 有任何问题随时在评论区 @Luna

再次感谢你的贡献！🚀`;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issueNumber,
              body: message
            });
