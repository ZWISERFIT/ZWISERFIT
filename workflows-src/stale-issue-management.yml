name: Stale Issue & PR Management
on:
  schedule:
    - cron: '30 1 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: ⏳ 这条 Issue 已 30 天无活动。如果仍需要讨论，请在评论区留言。如果 14 天内无回应，将自动关闭。
          stale-pr-message: ⏳ 这条 PR 已 30 天无活动。如果仍在进行中，请更新进度。如果 14 天内无回应，将自动关闭。
          close-issue-message: 🔒 因 14 天无活动，此 Issue 已自动关闭。如有需要可重新打开。
          close-pr-message: 🔒 因 14 天无活动，此 PR 已自动关闭。如有需要可重新打开。
          days-before-stale: 30
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: good-first-issue,help-wanted,priority-urgent
          exempt-pr-labels: good-first-issue,help-wanted,priority-urgent
          operations-per-run: 100
